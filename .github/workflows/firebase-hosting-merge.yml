name: Deploy to Firebase Hosting on merge
'on':
  push:
    branches:
      - master
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Dependencies
        run: cd pwa && npm ci
      - name: Create firebase.config.js
        env:
          FIREBASE_CONFIG: ${{ secrets.FIREBASE_CONFIG_JS }}
        run: |
          echo "$FIREBASE_CONFIG" > pwa/src/firebase.config.js
      - name: Build
        run: cd pwa && npm run build
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_FUEL_AOS }}'
          channelId: live
          projectId: fuel-aos
          entryPoint: pwa
